name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v3

      - name: Python installieren
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            libffi-dev libssl-dev \
            python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake \
            libstdc++6 libgcc1
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: APK bauen
        run: |
          buildozer -v android debug

      - name: APK hochladen
        uses: actions/upload-artifact@v3
        with:
          name: TodoApp-APK
          path: bin/*.apk

      - name: Release erstellen
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0-${{ github.run_number }}
          name: "To-Do App v1.${{ github.run_number }}"
          body: "✅ Neue Version automatisch gebaut! APK direkt herunterladen und installieren."
          files: bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
